name: Mirror to CodeCommit

# ═══════════════════════════════════════════════════════════════════════════════
# Unshelv'd — GitHub → AWS CodeCommit mirror
#
# Keeps the AWS CodeCommit repo (infra/unshelvd.cfn.yaml: CodeCommitRepo) in
# sync with every push to GitHub. Authentication uses the same OIDC role as
# deploy.yml — no long-lived AWS credentials are stored.
#
# Required GitHub repository variables (Settings → Variables → Actions):
#   AWS_REGION              — e.g. us-east-1
#   CODECOMMIT_HTTP_URL     — CodeCommitCloneUrlHttp stack output, e.g.
#                             https://git-codecommit.us-east-1.amazonaws.com/v1/repos/unshelvd
#
# Required GitHub repository secrets:
#   AWS_DEPLOY_ROLE_ARN     — GitHubDeployRoleArn stack output (same secret
#                             used by deploy.yml)
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  mirror:
    name: Push to CodeCommit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so --mirror carries all refs

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Push mirror to CodeCommit
        env:
          CODECOMMIT_URL: ${{ vars.CODECOMMIT_HTTP_URL }}
        run: |
          # Install the AWS CLI CodeCommit credential helper so git can sign
          # requests with the temporary OIDC credentials obtained above.
          git config --global credential.helper \
            '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true

          git remote add codecommit "$CODECOMMIT_URL"
          git push codecommit --mirror
