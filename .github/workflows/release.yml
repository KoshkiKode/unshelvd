name: Release

# ═══════════════════════════════════════════════════════════════════════════════
# Unshelv'd — App Release Pipeline
#
# Triggered by pushing a version tag: git tag v1.2.3 && git push --tags
#
# What it does:
#   1. Builds a signed Android APK (for direct install / Firebase App Dist.)
#      and a signed AAB (for the Play Store) in parallel with the iOS job.
#   2. Builds a signed iOS IPA for ad-hoc / Firebase App Distribution.
#   3. Creates a GitHub Release with all four files as downloadable assets.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   Android
#   ───────
#   ANDROID_KEYSTORE_BASE64   — base64(your.keystore) — see MOBILE.md for keytool cmd
#   KEYSTORE_PASSWORD         — store password for the keystore
#   KEY_PASSWORD              — key password (often the same as store password)
#   KEY_ALIAS                 — key alias (default: "unshelvd")
#
#   iOS
#   ───
#   IOS_CERTIFICATE_BASE64           — base64-encoded Distribution certificate (.p12)
#   IOS_CERTIFICATE_PASSWORD         — password for the .p12 file
#   IOS_PROVISIONING_PROFILE_BASE64  — base64-encoded Ad-Hoc provisioning profile
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   API_URL                   — e.g. https://unshelvd.koshkikode.com
#
# Optional Variables (used for affiliate/ad features in the app):
#   THRIFTBOOKS_AFF_ID        — ThriftBooks Impact affiliate ID
#   ADSENSE_CLIENT            — Google AdSense publisher ID
#
# To cut a release:
#   git tag v1.2.3
#   git push origin v1.2.3
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # e.g. v1.0.0, v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # e.g. v1.0.0-beta.1, v2.0.0-rc.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.2.3)'
        required: true

# All jobs need to read checkout content and write releases + artifacts.
permissions:
  contents: write

jobs:
  # ── Android — signed APK + AAB ──────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    outputs:
      apk_name: ${{ steps.rename.outputs.apk_name }}
      aab_name: ${{ steps.rename.outputs.aab_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: android
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/unshelvd-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Build signed APK (for direct install) AND AAB (for Play Store) in one pass
      - name: Build signed release APK + AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'unshelvd' }}

      - name: Rename artifacts with version
        id: rename
        run: |
          VERSION=${{ github.ref_name || inputs.tag }}
          APK_NAME="unshelvd-${VERSION}.apk"
          AAB_NAME="unshelvd-${VERSION}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          cp android/app/build/outputs/bundle/release/app-release.aab "$AAB_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "aab_name=$AAB_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: ${{ steps.rename.outputs.apk_name }}
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: ${{ steps.rename.outputs.aab_name }}
          retention-days: 90

  # ── iOS — signed IPA for ad-hoc / Firebase distribution ─────────────────────
  ios:
    name: iOS (IPA)
    runs-on: macos-latest

    outputs:
      ipa_name: ${{ steps.rename.outputs.ipa_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: ios
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain that lives only for this build
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate (.p12)
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the temp keychain the active one for this runner session
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Persist the password so the export step can use the same keychain
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Import provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/unshelvd.mobileprovision

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Unshelvd.xcarchive" \
            archive \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Export IPA (ad-hoc — for Firebase / Diawi / direct download)
        run: |
          # Unlock the keychain again in case Xcode locked it between steps
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Unshelvd.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist scripts/ExportOptions-adhoc.plist

      - name: Rename IPA with version
        id: rename
        run: |
          VERSION=${{ github.ref_name || inputs.tag }}
          IPA_NAME="unshelvd-${VERSION}.ipa"
          cp "$RUNNER_TEMP/export/"*.ipa "$IPA_NAME"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: ${{ steps.rename.outputs.ipa_name }}
          retention-days: 90

  # ── GitHub Release — attach all assets ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [android, ios]
    # Always create a release even if one platform job was skipped
    if: ${{ always() && (needs.android.result == 'success' || needs.ios.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name || inputs.tag }}"

          # Build a dynamic list of available assets
          ASSET_LIST=""
          if ls release-assets/*.apk 1>/dev/null 2>&1; then
            ASSET_LIST+="- 📱 **Android APK** — \`$(basename release-assets/*.apk)\` — direct install (Firebase App Distribution, Diawi, etc.)"$'\n'
          fi
          if ls release-assets/*.aab 1>/dev/null 2>&1; then
            ASSET_LIST+="- 📦 **Android AAB** — \`$(basename release-assets/*.aab)\` — Play Store upload"$'\n'
          fi
          if ls release-assets/*.ipa 1>/dev/null 2>&1; then
            ASSET_LIST+="- 🍎 **iOS IPA** — \`$(basename release-assets/*.ipa)\` — TestFlight / Firebase App Distribution"$'\n'
          fi

          gh release create "$VERSION" \
            --title "Unshelv'd $VERSION" \
            --notes "## Unshelv'd $VERSION

          ### Downloads

          ${ASSET_LIST}
          ### Android installation (APK — sideloading)
          1. Enable **Install from unknown sources** in Settings → Apps → Special app access
          2. Transfer the APK to your device (ADB, email, or a file share service)
          3. Open the APK file to install

          ### iOS installation
          Upload the IPA to [Firebase App Distribution](https://firebase.google.com/products/app-distribution), [TestFlight](https://developer.apple.com/testflight/), or [Diawi](https://www.diawi.com/) and share the link with testers.

          ---
          Built from commit \`${{ github.sha }}\`" \
            release-assets/*
