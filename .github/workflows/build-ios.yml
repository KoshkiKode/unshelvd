name: Build iOS

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'android/**'
  workflow_dispatch:

jobs:
  # ── Debug build (simulator, every push to main) ───────────────────────────
  build-debug:
    name: Debug build (simulator)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL || '' }}
          VITE_TARGET: ios
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build (simulator — no signing needed)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: unshelvd-ios-sim-${{ github.sha }}
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 30

  # ── Release archive (manual trigger — needs signing certificate) ──────────
  build-release:
    name: Release archive (App Store)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: ios
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the keychain default for this session
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Import provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/unshelvd.mobileprovision

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Unshelvd.xcarchive \
            archive \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Unshelvd.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist scripts/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unshelvd-ios-${{ github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 90
