name: Build

# ═══════════════════════════════════════════════════════════════════════════════
# Unshelv'd — Native App Build Pipeline
#
# Produces three artifacts and nothing else:
#   • unshelvd-<version>.apk  — Android APK  (direct install / Firebase App Dist.)
#   • unshelvd-<version>.aab  — Android AAB  (Play Store upload)
#   • unshelvd-<version>.ipa  — iOS IPA      (TestFlight / Firebase App Dist.)
#
# Triggers
# ────────
#   • Version tag push  (v1.2.3, v2.0.0-rc.1, …) — builds and creates a GitHub Release
#   • workflow_dispatch — manual run, builds only (no GitHub Release)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#
#   Android
#   ───────
#   ANDROID_KEYSTORE_BASE64   — base64(your.keystore)  (see MOBILE.md for keytool cmd)
#   KEYSTORE_PASSWORD         — keystore store password
#   KEY_PASSWORD              — key password  (often the same as store password)
#   KEY_ALIAS                 — key alias  (default: "unshelvd")
#
#   iOS
#   ───
#   IOS_CERTIFICATE_BASE64           — base64-encoded Distribution certificate (.p12)
#   IOS_CERTIFICATE_PASSWORD         — password for the .p12 file
#   IOS_PROVISIONING_PROFILE_BASE64  — base64-encoded Ad-Hoc provisioning profile
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   API_URL   — e.g. https://unshelvd.koshkikode.com
#
# Optional Variables:
#   THRIFTBOOKS_AFF_ID  — ThriftBooks Impact affiliate ID
#   ADSENSE_CLIENT      — Google AdSense publisher ID
#
# To cut a release:
#   git tag v1.2.3
#   git push origin v1.2.3
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'       # e.g. v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'     # e.g. v1.0.0-beta.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version label for artifact names (e.g. v1.2.3)'
        required: false
        default: 'manual'

# All jobs need read access to the repo; the release job also needs write to
# create a GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  # ── Android — signed APK + AAB ──────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    outputs:
      apk_name: ${{ steps.rename.outputs.apk_name }}
      aab_name: ${{ steps.rename.outputs.aab_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Stamp version from tag
        run: |
          VERSION="${{ github.ref_name || inputs.tag || '' }}"
          SEMVER="${VERSION#v}"
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
            npm version "$SEMVER" --no-git-tag-version --allow-same-version
            echo "Stamped package.json to $SEMVER"
          else
            echo "No valid semver tag ('$VERSION') — keeping package.json at $(node -p "require('./package.json').version")"
          fi

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: android
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/unshelvd-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release APK + AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'unshelvd' }}

      - name: Rename artifacts with version
        id: rename
        run: |
          VERSION="${{ github.ref_name || inputs.tag || 'manual' }}"
          APK_NAME="unshelvd-${VERSION}.apk"
          AAB_NAME="unshelvd-${VERSION}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          cp android/app/build/outputs/bundle/release/app-release.aab "$AAB_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "aab_name=$AAB_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: ${{ steps.rename.outputs.apk_name }}
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: ${{ steps.rename.outputs.aab_name }}
          retention-days: 90

  # ── iOS — signed IPA ────────────────────────────────────────────────────────
  ios:
    name: iOS (IPA)
    runs-on: macos-latest
    permissions:
      contents: read

    outputs:
      ipa_name: ${{ steps.rename.outputs.ipa_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stamp version from tag
        run: |
          VERSION="${{ github.ref_name || inputs.tag || '' }}"
          SEMVER="${VERSION#v}"
          if [[ "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
            npm version "$SEMVER" --no-git-tag-version --allow-same-version
            echo "Stamped package.json to $SEMVER"
          else
            echo "No valid semver tag ('$VERSION') — keeping package.json at $(node -p "require('./package.json').version")"
          fi

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: ios
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain that lives only for this build
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the distribution certificate (.p12)
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the temp keychain the active one for this runner session
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Persist for use in the export step
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Import provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/unshelvd.mobileprovision

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Unshelvd.xcarchive" \
            archive \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Export IPA (ad-hoc)
        run: |
          # Unlock keychain again in case Xcode locked it between steps
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Unshelvd.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist scripts/ExportOptions-adhoc.plist

      - name: Rename IPA with version
        id: rename
        run: |
          VERSION="${{ github.ref_name || inputs.tag || 'manual' }}"
          IPA_NAME="unshelvd-${VERSION}.ipa"
          cp "$RUNNER_TEMP/export/"*.ipa "$IPA_NAME"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: ${{ steps.rename.outputs.ipa_name }}
          retention-days: 90

  # ── GitHub Release — only when triggered by a version tag ───────────────────
  create-release:
    name: Create GitHub Release
    needs: [android, ios]
    # Only run on tag pushes; skip for manual workflow_dispatch runs
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && (needs.android.result == 'success' || needs.ios.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Build a dynamic list of available assets
          ASSET_LIST=""
          if ls release-assets/*.apk 1>/dev/null 2>&1; then
            ASSET_LIST+="- 📱 **Android APK** — \`$(basename release-assets/*.apk)\` — direct install (Firebase App Distribution, Diawi, etc.)"$'\n'
          fi
          if ls release-assets/*.aab 1>/dev/null 2>&1; then
            ASSET_LIST+="- 📦 **Android AAB** — \`$(basename release-assets/*.aab)\` — Play Store upload"$'\n'
          fi
          if ls release-assets/*.ipa 1>/dev/null 2>&1; then
            ASSET_LIST+="- 🍎 **iOS IPA** — \`$(basename release-assets/*.ipa)\` — TestFlight / Firebase App Distribution"$'\n'
          fi

          gh release create "$VERSION" \
            --title "Unshelv'd $VERSION" \
            --notes "## Unshelv'd $VERSION

          ### Downloads

          ${ASSET_LIST}
          ### Android installation (APK — sideloading)
          1. Enable **Install from unknown sources** in Settings → Apps → Special app access
          2. Transfer the APK to your device (ADB, email, or a file share service)
          3. Open the APK file to install

          ### iOS installation
          Upload the IPA to [Firebase App Distribution](https://firebase.google.com/products/app-distribution), [TestFlight](https://developer.apple.com/testflight/), or [Diawi](https://www.diawi.com/) and share the link with testers.

          ---
          Built from commit \`${{ github.sha }}\`" \
            release-assets/*
