name: Deploy CloudFormation Stack (disabled — use scripts/deploy-infra.sh)

# ═══════════════════════════════════════════════════════════════════════════════
# ⚠️  THIS WORKFLOW IS DISABLED.
#
# Infrastructure deployment is now done locally from macOS using the AWS CLI.
# Run `./scripts/deploy-infra.sh` from the repo root instead.
# See DEPLOY.md for full prerequisites and instructions.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is disabled. Use scripts/deploy-infra.sh on macOS instead.'
        required: true
        default: 'no'

jobs:
  notice:
    name: Infrastructure deployment is handled locally via scripts/deploy-infra.sh
    runs-on: ubuntu-latest
    steps:
      - name: Print notice
        run: |
          echo "⚠️  This workflow is disabled."
          echo "Deploy infrastructure from your Mac instead:"
          echo "  cd /path/to/unshelvd"
          echo "  export CERTIFICATE_ARN=arn:aws:acm:us-east-1:<account>:certificate/<id>"
          echo "  ./scripts/deploy-infra.sh"
          echo ""
          echo "See DEPLOY.md for full prerequisites and instructions."
