name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'ios/**'
  workflow_dispatch:

jobs:
  # ── Debug APK (every push to main) ───────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          # Point to the production API; falls back to relative if unset
          VITE_API_URL: ${{ vars.API_URL || '' }}
          VITE_TARGET: android
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: unshelvd-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ── Release AAB (manual trigger only — needs keystore secrets) ───────────
  build-release:
    name: Release AAB
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_TARGET: android
          NODE_ENV: production
          SKIP_ENV_VERIFY: "true"
          VITE_THRIFTBOOKS_AFF_ID: ${{ vars.THRIFTBOOKS_AFF_ID || '' }}
          VITE_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/unshelvd-release.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'unshelvd' }}

      - name: Upload Release AAB
        uses: actions/upload-artifact@v7
        with:
          name: unshelvd-release-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
