name: Deploy (disabled — use scripts/deploy.sh)

# ═══════════════════════════════════════════════════════════════════════════════
# ⚠️  THIS WORKFLOW IS DISABLED.
#
# Deployment is now done locally from macOS using the AWS CLI.
# Run `./scripts/deploy.sh` from the repo root instead.
# See DEPLOY.md for full instructions.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is disabled. Use scripts/deploy.sh on macOS instead.'
        required: true
        default: 'no'

jobs:
  notice:
    name: Deployment is handled locally via scripts/deploy.sh
    runs-on: ubuntu-latest
    steps:
      - name: Print notice
        run: |
          echo "⚠️  This workflow is disabled."
          echo "Deploy from your Mac instead:"
          echo "  cd /path/to/unshelvd"
          echo "  ./scripts/deploy.sh"
          echo ""
          echo "See DEPLOY.md for full prerequisites and instructions."
