name: Deploy

# ═══════════════════════════════════════════════════════════════════════════════
# Unshelv'd — AWS Deploy Pipeline
#
# Builds the production Docker image, pushes to Amazon ECR, then deploys to
# ECS Fargate via a rolling update. Database migrations are run as a separate
# job before the new image goes live.
#
# Auth: uses GitHub OIDC to assume an IAM role — no long-lived AWS keys are
# stored as secrets. Set up the trust policy following:
#   https://docs.aws.amazon.com/AmazonECR/latest/userguide/getting-started-cli.html
#   https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
#
# Required GitHub repository secrets:
#   AWS_DEPLOY_ROLE_ARN         — IAM role ARN with ecr:*, ecs:*, and
#                                 secretsmanager:GetSecretValue on
#                                 unshelvd/DATABASE_URL
#
# Required GitHub repository variables (Settings → Variables → Actions):
#   ECR_REPOSITORY              — e.g. unshelvd
#   ECS_CLUSTER                 — e.g. unshelvd
#   ECS_SERVICE                 — e.g. unshelvd
#   ECS_TASK_DEFINITION         — e.g. unshelvd
#   ECS_CONTAINER_NAME          — e.g. unshelvd
#   DATABASE_URL_SECRET_ID      — e.g. unshelvd/DATABASE_URL
#
# Triggers: pushes to main, plus manual dispatch.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'android/**'
      - 'ios/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Drizzle migrate (Amazon RDS)
    runs-on: ubuntu-latest
    environment: production
    # Migrations must run BEFORE the new container is deployed — otherwise a
    # release that adds a column the app reads will crash the new instance
    # before the schema catches up. Drizzle migrations are idempotent (the
    # journal records what's been applied), so re-running on a no-op deploy
    # is safe.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (production only is enough for migrate)
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch DATABASE_URL from Secrets Manager
        id: db-url
        run: |
          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "${{ vars.DATABASE_URL_SECRET_ID }}" \
            --query SecretString --output text)
          echo "::add-mask::$VALUE"
          echo "DATABASE_URL=$VALUE" >> "$GITHUB_ENV"

      - name: Run migrations
        run: node script/migrate.js

  build-and-deploy:
    name: Build → ECR → ECS
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPO:$SHA"
          docker build \
            --build-arg VITE_THRIFTBOOKS_AFF_ID="${{ vars.THRIFTBOOKS_AFF_ID }}" \
            --build-arg VITE_ADSENSE_CLIENT="${{ vars.ADSENSE_CLIENT }}" \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY="${{ vars.STRIPE_PUBLISHABLE_KEY }}" \
            --build-arg VITE_API_URL="" \
            -t "$IMAGE" \
            -t "$REGISTRY/$REPO:latest" \
            .
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPO:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_DEFINITION }}" \
            --query taskDefinition > /tmp/task-def.json

      - name: Update image in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-def.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ env.IMAGE }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
