name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  test:
    name: Type-check, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VERIFY: "true"

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: unshelvd-web-${{ github.sha }}
          path: dist/
          retention-days: 30
