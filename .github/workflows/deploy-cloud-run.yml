name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'android/**'
      - 'ios/**'
  workflow_dispatch:

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGION: us-central1
  SERVICE_NAME: unshelvd
  REPO: unshelvd
  DB_INSTANCE_NAME: unshelvd-db
  # Full image path: REGION-docker.pkg.dev/PROJECT/REPO/SERVICE:SHA
  IMAGE: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/unshelvd/unshelvd

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to Google Cloud ──────────────────────────────────────
      # Option A (recommended): Workload Identity Federation — no long-lived key
      # Requires one-time setup: https://github.com/google-github-actions/auth#setting-up-workload-identity-federation
      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      # Option B (fallback): Service Account JSON key stored as a secret
      - name: Authenticate to Google Cloud (Service Account Key)
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Configure gcloud & Docker ─────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build & push Docker image ─────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --platform=managed
            --allow-unauthenticated  # Public web app — app-level auth is handled by Express/Passport
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --add-cloudsql-instances=${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest
          env_vars: |
            NODE_ENV=production

      # ── Print deployed URL ────────────────────────────────────────────────
      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
