# Unshelv'd seeds searchable SQL Connect catalog data through the direct PostgreSQL
# setup path instead of through GraphQL seed operations.
#
# Run `npm run db:setup` for a configured local `DATABASE_URL`, or run
# `database/setup.sh` for a remote SQL Connect backing database. The seed script
# prefers `dataconnect/catalog.csv` and populates the book_catalog fields used by
# `connector/queries.gql`.
#
# This file remains a placeholder so local GraphQL tooling has a stable seed
# document path without bringing the old example seed back.