type Work
  @table(name: "works", key: "id", singular: "work", plural: "works") {
  id: Int! @col(dataType: "serial")
  title: String!
  titleOriginal: String @col(name: "title_original")
  titleOriginalScript: String @col(name: "title_original_script")
  author: String!
  authorOriginal: String @col(name: "author_original")
  authorOriginalScript: String @col(name: "author_original_script")
  openLibraryWorkId: String @unique @col(name: "open_library_work_id")
  wikidataId: String @col(name: "wikidata_id")
  goodreadsWorkId: String @col(name: "goodreads_work_id")
  originalLanguage: String @col(name: "original_language")
  firstPublishedYear: Int @col(name: "first_published_year")
  genre: String
  subjects: String
  description: String
  coverUrl: String @col(name: "cover_url")
  editionCount: Int @default(value: 0) @col(name: "edition_count")
  translationCount: Int @default(value: 0) @col(name: "translation_count")
  languageCount: Int @default(value: 0) @col(name: "language_count")
  listingCount: Int @default(value: 0) @col(name: "listing_count")
  source: String
  verified: Boolean @default(value: false)
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
  updatedAt: Timestamp @default(sql: "now()") @col(name: "updated_at", dataType: "timestamp")
}

type User
  @table(name: "users", key: "id", singular: "user", plural: "users") {
  id: Int! @col(dataType: "serial")
  username: String! @unique
  displayName: String! @col(name: "display_name")
  email: String! @unique
  password: String!
  bio: String
  avatarUrl: String @col(name: "avatar_url")
  location: String
  rating: Float @default(value: 0) @col(dataType: "real")
  ratingCount: Int @default(value: 0) @col(name: "rating_count")
  totalSales: Int @default(value: 0) @col(name: "total_sales")
  totalPurchases: Int @default(value: 0) @col(name: "total_purchases")
  role: String @default(value: "user")
  stripeAccountId: String @col(name: "stripe_account_id")
  stripeOnboarded: Boolean @default(value: false) @col(name: "stripe_onboarded")
  passwordResetToken: String @col(name: "password_reset_token")
  passwordResetExpiry: Timestamp @col(name: "password_reset_expiry", dataType: "timestamp")
  emailVerified: Boolean @default(value: false) @col(name: "email_verified")
  emailVerifyToken: String @col(name: "email_verify_token")
  emailVerifyExpiry: Timestamp @col(name: "email_verify_expiry", dataType: "timestamp")
  buyerRating: Float @default(value: 0) @col(name: "buyer_rating", dataType: "real")
  buyerRatingCount: Int @default(value: 0) @col(name: "buyer_rating_count")
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type BookCatalog
  @table(name: "book_catalog", key: "id", singular: "bookCatalog", plural: "bookCatalogs")
  @index(fields: ["workId"]) {
  id: Int! @col(dataType: "serial")
  title: String!
  titleNative: String @col(name: "title_native")
  titleRomanized: String @col(name: "title_romanized")
  author: String!
  authorNative: String @col(name: "author_native")
  authorRomanized: String @col(name: "author_romanized")
  isbn10: String @col(name: "isbn_10")
  isbn13: String @col(name: "isbn_13")
  oclc: String
  lccn: String
  openLibraryId: String @unique @col(name: "open_library_id")
  goodreadsId: String @col(name: "goodreads_id")
  publisher: String
  publisherNative: String @col(name: "publisher_native")
  publicationYear: Int @col(name: "publication_year")
  firstPublishedYear: Int @col(name: "first_published_year")
  edition: String
  editionNumber: Int @col(name: "edition_number")
  pages: Int
  language: String!
  originalLanguage: String @col(name: "original_language")
  countryOfOrigin: String @col(name: "country_of_origin")
  script: String
  textDirection: String @col(name: "text_direction")
  genre: String
  subjects: String
  deweyDecimal: String @col(name: "dewey_decimal")
  lcClassification: String @col(name: "lc_classification")
  calendarSystem: String @col(name: "calendar_system")
  calendarYear: String @col(name: "calendar_year")
  era: String
  coverUrl: String @col(name: "cover_url")
  description: String
  workId: Int @col(name: "work_id")
  work: Work @ref(fields: "workId", references: "id")
  source: String
  sourceId: String @col(name: "source_id")
  verified: Boolean @default(value: false)
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
  updatedAt: Timestamp @default(sql: "now()") @col(name: "updated_at", dataType: "timestamp")
}

type Book
  @table(name: "books", key: "id", singular: "book", plural: "books")
  @index(fields: ["userId"])
  @index(fields: ["status"])
  @index(fields: ["genre"]) {
  id: Int! @col(dataType: "serial")
  userId: Int! @col(name: "user_id")
  title: String!
  author: String!
  isbn: String
  coverUrl: String @col(name: "cover_url")
  description: String
  condition: String!
  status: String!
  price: Float @col(dataType: "real")
  genre: String
  publisher: String
  edition: String
  year: Int
  language: String
  originalLanguage: String @col(name: "original_language")
  countryOfOrigin: String @col(name: "country_of_origin")
  printCountry: String @col(name: "print_country")
  era: String
  script: String
  calendarSystem: String @col(name: "calendar_system")
  calendarYear: String @col(name: "calendar_year")
  textDirection: String @col(name: "text_direction")
  catalogId: Int @col(name: "catalog_id")
  catalog: BookCatalog @ref(fields: "catalogId", references: "id")
  workId: Int @col(name: "work_id")
  work: Work @ref(fields: "workId", references: "id")
  chatEnabled: Boolean @default(value: true) @col(name: "chat_enabled")
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type BookRequest
  @table(name: "book_requests", key: "id", singular: "bookRequest", plural: "bookRequests")
  @index(fields: ["userId"])
  @index(fields: ["status"]) {
  id: Int! @col(dataType: "serial")
  userId: Int! @col(name: "user_id")
  title: String!
  author: String
  isbn: String
  edition: String
  description: String
  maxPrice: Float @col(name: "max_price", dataType: "real")
  language: String
  countryOfOrigin: String @col(name: "country_of_origin")
  status: String @default(value: "open")
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type Conversation
  @table(name: "conversations", key: "id", singular: "conversation", plural: "conversations")
  @unique(fields: ["bookId", "buyerId"])
  @index(fields: ["buyerId"])
  @index(fields: ["sellerId"])
  @index(fields: ["bookId"])
  @index(fields: ["status"]) {
  id: Int! @col(dataType: "serial")
  bookId: Int! @col(name: "book_id")
  buyerId: Int! @col(name: "buyer_id")
  sellerId: Int! @col(name: "seller_id")
  status: String! @default(value: "active")
  initiatedAt: Timestamp @default(sql: "now()") @col(name: "initiated_at", dataType: "timestamp")
  closedAt: Timestamp @col(name: "closed_at", dataType: "timestamp")
}

type Message
  @table(name: "messages", key: "id", singular: "message", plural: "messages")
  @index(fields: ["senderId"])
  @index(fields: ["receiverId"])
  @index(fields: ["isRead"])
  @index(fields: ["conversationId"]) {
  id: Int! @col(dataType: "serial")
  senderId: Int! @col(name: "sender_id")
  receiverId: Int! @col(name: "receiver_id")
  bookId: Int @col(name: "book_id")
  book: Book @ref(fields: "bookId", references: "id")
  conversationId: Int @col(name: "conversation_id")
  conversation: Conversation @ref(fields: "conversationId", references: "id")
  content: String!
  isRead: Boolean @default(value: false) @col(name: "is_read")
  deletedBySender: Boolean @default(value: false) @col(name: "deleted_by_sender")
  flagged: Boolean @default(value: false)
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type BlockRecord
  @table(name: "block_records", key: "id", singular: "blockRecord", plural: "blockRecords")
  @unique(fields: ["blockerId", "blockedId"])
  @index(fields: ["blockerId"])
  @index(fields: ["blockedId"]) {
  id: Int! @col(dataType: "serial")
  blockerId: Int! @col(name: "blocker_id")
  blockedId: Int! @col(name: "blocked_id")
  reason: String
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type Report
  @table(name: "reports", key: "id", singular: "report", plural: "reports")
  @index(fields: ["reporterId"])
  @index(fields: ["reportedUserId"])
  @index(fields: ["outcome"]) {
  id: Int! @col(dataType: "serial")
  reporterId: Int! @col(name: "reporter_id")
  reportedUserId: Int! @col(name: "reported_user_id")
  messageId: Int @col(name: "message_id")
  message: Message @ref(fields: "messageId", references: "id")
  conversationId: Int @col(name: "conversation_id")
  conversation: Conversation @ref(fields: "conversationId", references: "id")
  category: String!
  description: String
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
  reviewedByAdminId: Int @col(name: "reviewed_by_admin")
  reviewedByAdminUser: User @ref(fields: "reviewedByAdminId", references: "id")
  reviewedAt: Timestamp @col(name: "reviewed_at", dataType: "timestamp")
  outcome: String
}

type AuditLog
  @table(name: "audit_log", key: "id", singular: "auditLog", plural: "auditLogs")
  @index(fields: ["action"])
  @index(fields: ["adminId"])
  @index(fields: ["targetUserId"]) {
  id: Int! @col(dataType: "serial")
  action: String!
  adminId: Int @col(name: "admin_id")
  admin: User @ref(fields: "adminId", references: "id")
  targetUserId: Int @col(name: "target_user_id")
  targetUser: User @ref(fields: "targetUserId", references: "id")
  details: String
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type Offer
  @table(name: "offers", key: "id", singular: "offer", plural: "offers")
  @index(fields: ["buyerId"])
  @index(fields: ["sellerId"]) {
  id: Int! @col(dataType: "serial")
  buyerId: Int! @col(name: "buyer_id")
  sellerId: Int! @col(name: "seller_id")
  bookId: Int! @col(name: "book_id")
  amount: Float! @col(dataType: "real")
  status: String @default(value: "pending")
  counterAmount: Float @col(name: "counter_amount", dataType: "real")
  message: String
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
}

type Transaction
  @table(name: "transactions", key: "id", singular: "transaction", plural: "transactions")
  @index(fields: ["buyerId"])
  @index(fields: ["sellerId"])
  @index(fields: ["status"]) {
  id: Int! @col(dataType: "serial")
  buyerId: Int! @col(name: "buyer_id")
  sellerId: Int! @col(name: "seller_id")
  bookId: Int! @col(name: "book_id")
  offerId: Int @col(name: "offer_id")
  offer: Offer @ref(fields: "offerId", references: "id")
  amount: Float! @col(dataType: "real")
  platformFee: Float! @col(name: "platform_fee", dataType: "real")
  sellerPayout: Float! @col(name: "seller_payout", dataType: "real")
  currency: String @default(value: "usd")
  stripePaymentIntentId: String @col(name: "stripe_payment_intent_id")
  stripeTransferId: String @col(name: "stripe_transfer_id")
  paypalOrderId: String @col(name: "paypal_order_id")
  paypalCaptureId: String @col(name: "paypal_capture_id")
  paypalAuthorizationId: String @col(name: "paypal_authorization_id")
  status: String @default(value: "pending")
  buyerRating: Int @col(name: "buyer_rating")
  sellerRating: Int @col(name: "seller_rating")
  shippingCarrier: String @col(name: "shipping_carrier")
  trackingNumber: String @col(name: "tracking_number")
  shippedAt: Timestamp @col(name: "shipped_at", dataType: "timestamp")
  deliveredAt: Timestamp @col(name: "delivered_at", dataType: "timestamp")
  completedAt: Timestamp @col(name: "completed_at", dataType: "timestamp")
  createdAt: Timestamp @default(sql: "now()") @col(name: "created_at", dataType: "timestamp")
  updatedAt: Timestamp @default(sql: "now()") @col(name: "updated_at", dataType: "timestamp")
}

type PlatformSetting
  @table(name: "platform_settings", key: "settingKey", singular: "platformSetting", plural: "platformSettings") {
  settingKey: String! @col(name: "key")
  value: String
  updatedAt: Timestamp @default(sql: "now()") @col(name: "updated_at", dataType: "timestamp")
}