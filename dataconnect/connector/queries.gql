query ListCatalogEntries($limit: Int = 50, $offset: Int = 0)
@auth(level: PUBLIC, insecureReason: "Catalog seed data is public read-only metadata.") {
  bookCatalogs(orderBy: [{ title: ASC }], limit: $limit, offset: $offset) {
    id
    title
    author
    language
    publisher
    publicationYear
    genre
    coverUrl
    originalLanguage
    countryOfOrigin
    workId
  }
}

query SearchCatalogByTitle($title: String!, $limit: Int = 50)
@auth(level: PUBLIC, insecureReason: "Catalog seed data is public read-only metadata.") {
  bookCatalogs(
    where: { title: { contains: $title } }
    orderBy: [{ title: ASC }]
    limit: $limit
  ) {
    id
    title
    author
    language
    publisher
    publicationYear
    genre
    coverUrl
    originalLanguage
    countryOfOrigin
    workId
  }
}

query SearchCatalog($query: String!, $limit: Int = 50)
@auth(level: PUBLIC, insecureReason: "Catalog seed data is public read-only metadata.") {
  bookCatalogs(
    where: {
      _or: [
        { title: { contains: $query } }
        { author: { contains: $query } }
        { genre: { contains: $query } }
      ]
    }
    orderBy: [{ title: ASC }]
    limit: $limit
  ) {
    id
    title
    author
    language
    publisher
    publicationYear
    genre
    coverUrl
    originalLanguage
    countryOfOrigin
    workId
  }
}

query ListWorks($limit: Int = 50, $offset: Int = 0)
@auth(level: PUBLIC, insecureReason: "Catalog seed data is public read-only metadata.") {
  works(orderBy: [{ title: ASC }], limit: $limit, offset: $offset) {
    id
    title
    author
    originalLanguage
    firstPublishedYear
    genre
    coverUrl
  }
}