# Google Cloud Build config
# Builds the Docker image and deploys to Cloud Run + Cloud SQL.
#
# One-command deploy:
#   gcloud builds submit --config=cloudbuild.yaml [--substitutions=...]
#
# Required secrets in Secret Manager (create once — see DEPLOY.md § "Secrets"):
#   DATABASE_URL          — Cloud SQL Unix-socket connection string
#   SESSION_SECRET        — random 32-byte hex string
#
# Secrets for Stripe payments (see DEPLOY.md § "Stripe Payments"):
#   STRIPE_SECRET_KEY     — Stripe server-side secret key  (sk_live_... / sk_test_...)
#   STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret  (whsec_...)
#
# Optional admin credential secrets — only needed if you want to pin credentials
#   instead of using the auto-generated ones printed in the seed-job logs.
#   Create these in Secret Manager BEFORE enabling them (see step 4 in this file):
#   ADMIN_EMAIL           — admin account email
#   ADMIN_USERNAME        — admin account username
#   ADMIN_PASSWORD        — admin account password (strong, randomly generated)
#
# NOTE: VITE_STRIPE_PUBLISHABLE_KEY is a build-time env var, not a runtime secret.
#       Pass it via --substitutions=_STRIPE_PK=pk_live_... (see substitutions below).
#
# Substitutions (override with --substitutions flag):
#   _REGION               GCP region                   (default: us-central1)
#   _SERVICE_NAME         Cloud Run service name        (default: unshelvd)
#   _REPO                 Artifact Registry repo name   (default: unshelvd)
#   _SQL_INSTANCE         Cloud SQL instance name       (default: unshelvd-db)
#   _MEMORY               Cloud Run memory allocation   (default: 512Mi)
#   _MIN_INSTANCES        Cloud Run min instances       (default: 1 — keeps one warm for WebSocket)
#   _MAX_INSTANCES        Cloud Run max instances       (default: 3)
#   _STRIPE_PK            Stripe publishable key        (default: "" — payments disabled)
#   _API_URL              Optional API base URL for Vite (default: "" — same-origin)
#   _THRIFTBOOKS_AFF_ID   ThriftBooks affiliate ID      (default: "" — affiliate links disabled)
#   _ADSENSE_CLIENT       AdSense publisher ID          (default: "" — ads disabled)

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: unshelvd
  _REPO: unshelvd
  _SQL_INSTANCE: unshelvd-db
  _MEMORY: 512Mi
  _MIN_INSTANCES: "1"
  _MAX_INSTANCES: "3"
  # Stripe publishable key — safe to embed at build time (not a secret).
  # Override at deploy time:  --substitutions=_STRIPE_PK=pk_live_...
  # Leave blank to run in dev/no-payment mode.
  _STRIPE_PK: ""
  # Optional API URL override for client bundle. Leave blank for same-origin API.
  _API_URL: ""
  # Affiliate and ad IDs — safe to bake into the client bundle at build time.
  _THRIFTBOOKS_AFF_ID: ""
  _ADSENSE_CLIENT: ""
  # GCS bucket name for profile image storage.
  # Grant allUsers roles/storage.objectViewer for public read access.
  # Leave blank to run in data-URI fallback mode (not recommended for production).
  _GCS_BUCKET: ""

steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "--build-arg=VITE_THRIFTBOOKS_AFF_ID=${_THRIFTBOOKS_AFF_ID}"
      - "--build-arg=VITE_ADSENSE_CLIENT=${_ADSENSE_CLIENT}"
      - "--build-arg=VITE_STRIPE_PUBLISHABLE_KEY=${_STRIPE_PK}"
      - "--build-arg=VITE_API_URL=${_API_URL}"
      - "."

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # 3. Migrate Job — applies Drizzle schema migrations before the service goes live.
  #    This is idempotent: already-applied migrations are skipped automatically.
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "${_SERVICE_NAME}-migrate"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--command=node"
      - "--args=script/migrate.js"
      - "--region=${_REGION}"
      - "--set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest"
      - "--max-retries=1"
      - "--task-timeout=300s"
      - "--execute-now"
      - "--wait"

  # 4. Seed Job — inserts 126 works + 156 catalog entries if the tables are empty.
  #    Completely idempotent: skips if data already exists (no data loss on re-deploy).
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "${_SERVICE_NAME}-seed"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--command=node"
      - "--args=script/seed.js"
      - "--region=${_REGION}"
      - "--set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}"
      # Only DATABASE_URL and SESSION_SECRET are required here.
      # ADMIN_EMAIL / ADMIN_USERNAME / ADMIN_PASSWORD are optional overrides — the
      # seed script auto-generates fresh credentials and prints them to the job log
      # if these are not set.  Do NOT add them to --set-secrets unless you have
      # created those secrets in Secret Manager first, or the job deploy will fail.
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest"
      - "--set-env-vars=NODE_ENV=production"
      - "--max-retries=1"
      - "--task-timeout=300s"
      - "--execute-now"
      - "--wait"

  # 5. Deploy the main Cloud Run service
  #
  # ── Stripe secrets ──────────────────────────────────────────────────────────
  # STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET are intentionally NOT in
  # --set-secrets by default.  Cloud Run refuses to deploy if a referenced
  # secret doesn't exist in Secret Manager, so adding them before you've
  # created the secrets breaks every deploy.
  #
  # Once you have created both secrets in Secret Manager:
  #   gcloud secrets create STRIPE_SECRET_KEY --data-file=-   <<< "sk_live_..."
  #   gcloud secrets create STRIPE_WEBHOOK_SECRET --data-file=- <<< "whsec_..."
  #
  # Add them to the --set-secrets line below:
  #   --set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
  #
  # Also pass the publishable key at deploy time:
  #   gcloud builds submit --config=cloudbuild.yaml \
  #     --substitutions=_STRIPE_PK=pk_live_...
  #
  # The app runs in no-payment mode (Stripe disabled) when these are absent.
  #
  # ── Admin credentials ───────────────────────────────────────────────────────
  # Optional admin credential overrides:
  # Set ADMIN_EMAIL/ADMIN_USERNAME/ADMIN_PASSWORD in Secret Manager only if you
  # want deterministic admin credentials instead of auto-generated rotation.
  #
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=${_MEMORY}"
      - "--cpu=1"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--startup-cpu-boost"
      - "--set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_SQL_INSTANCE}"
      # Only the two required secrets by default. Add Stripe secrets here once
      # you have created STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET in Secret
      # Manager (see comment above).
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest"
      - "--set-env-vars=NODE_ENV=production,GCS_BUCKET_NAME=${_GCS_BUCKET}"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"
