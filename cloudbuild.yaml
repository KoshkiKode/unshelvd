# Google Cloud Build config
# Builds the Docker image and deploys to Cloud Run
#
# Prerequisites:
#   1. Enable Cloud Run, Cloud Build, Cloud SQL, and Artifact Registry APIs
#   2. Create a Cloud SQL PostgreSQL instance
#   3. Create an Artifact Registry Docker repo
#   4. Set up these substitution variables or use defaults below
#
# Deploy manually:
#   gcloud builds submit --config=cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: unshelvd
  _REPO: unshelvd

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"
      - "--set-env-vars=NODE_ENV=production"
      - "--add-cloudsql-instances=unshelvd:us-central1:unshelvd"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"
