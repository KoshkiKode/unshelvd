# Google Cloud Build config
# Builds the Docker image and deploys to Cloud Run

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: unshelvd
  _REPO: unshelvd

steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "."

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # 3. Bootstrap Job — uses Cloud SQL connector (no VPC needed for public IP instance)
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "unshelvd-bootstrap"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "--command=npm"
      - "--args=run,db:bootstrap"
      - "--region=${_REGION}"
      - "--set-cloudsql-instances=${PROJECT_ID}:us-central1:unshelvd-db"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest"
      - "--execute-now"
      - "--wait"

  # 4. Deploy the Main Service
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"
      - "--set-cloudsql-instances=${PROJECT_ID}:us-central1:unshelvd-db"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,SESSION_SECRET=SESSION_SECRET:latest"
      - "--set-env-vars=NODE_ENV=production"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"
