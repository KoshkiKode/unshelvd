AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Unshelv'd — single-region AWS architecture (us-east-1, AZs a+d)
  VPC, ALB, ECS Fargate service, RDS PostgreSQL, ECR, S3 + CloudFront via OAC,
  Secrets Manager scaffold, CloudWatch alarms, SNS.
  Codifies steps 1–9 of the architecture plan.
  Steps 10–12 (Amplify Hosting, SES domain verification, Route 53 records)
  are console-driven and documented in DEPLOY.md.

# ──────────────────────────────────────────────────────────────────────────────
# Usage — AWS Console + GitHub Actions (no CLI required):
#
#   BEFORE running the workflow you must have:
#     1. An ACM certificate in us-east-1 covering `unshelvd.<DomainName>`.
#        Console: Certificate Manager → Request → DNS validation → approve via
#        Route 53.  Copy the resulting ARN.
#     2. A bootstrap IAM role that GitHub Actions can assume to deploy the
#        stack on its first run.  The stack itself creates the permanent
#        `unshelvd-github-deploy` role; once the stack is up you switch the
#        secret to the stack-output ARN and can delete the bootstrap role.
#        Console: IAM → Roles → Create role → Web identity →
#          Identity provider: token.actions.githubusercontent.com
#          Audience: sts.amazonaws.com
#          Condition: repo:KoshkiKode/unshelvd:*
#        Attach PowerUserAccess + IAMFullAccess (or a scoped policy with
#        cloudformation:*, iam:*, ecr:*, ecs:*, rds:*, ec2:*, s3:*,
#        secretsmanager:*, logs:*, sns:*, codecommit:*, cloudwatch:*,
#        application-autoscaling:*, cloudfront:*).
#
#   GitHub repository SECRETS (Settings → Secrets and variables → Secrets):
#     AWS_DEPLOY_ROLE_ARN   — bootstrap IAM role ARN (step 2 above).
#                             After the stack is created update this to the
#                             GitHubDeployRoleArn stack output.
#     CFN_CERTIFICATE_ARN   — ACM cert ARN from step 1.
#     CFN_DB_PASSWORD       — RDS master password, 16+ chars. Choose once and
#                             never change it (RDS ignores password updates).
#
#   GitHub repository VARIABLES (Settings → Secrets and variables → Variables):
#     GITHUBOIDCPROVIDERARN — ARN of an existing GitHub OIDC provider in this
#                             account, e.g.:
#                             arn:aws:iam::261142221895:oidc-provider/token.actions.githubusercontent.com
#                             Console: IAM → Identity providers.
#                             Leave the variable EMPTY to have the stack create
#                             the provider automatically (safe only if no
#                             provider exists yet — one per URL per account).
#
#   Optional GitHub repository VARIABLES:
#     CFN_DOMAIN_NAME       — Apex domain (default: koshkikode.com)
#     CFN_ALERT_EMAIL       — Ops alert email (default: ops@koshkikode.com)
#     CFN_CDN_CERTIFICATE_ARN — ACM cert in us-east-1 for cdn.<domain>
#                             (needed to use the cdn.<domain> alias on
#                             CloudFront; leave blank to use the auto-generated
#                             *.cloudfront.net domain until you are ready).
#     CFN_DB_INSTANCE_CLASS — RDS instance size (default: db.t4g.micro)
#     CFN_STACK_NAME        — CloudFormation stack name (default: unshelvd)
#
#   Trigger the workflow:
#     GitHub → Actions → "Deploy CloudFormation Stack" → Run workflow → main.
#     The workflow takes ~15 minutes on first run (RDS creation dominates).
#
#   After the stack is CREATED (one-time post-stack actions):
#     a. Open CloudFormation → Stacks → unshelvd → Outputs tab and note:
#          GitHubDeployRoleArn, AlbDnsName, CloudFrontDomainName,
#          EcrRepositoryUri, UploadsBucketName, CodeCommitCloneUrlHttp.
#     b. Update the AWS_DEPLOY_ROLE_ARN secret to GitHubDeployRoleArn.
#     c. Set these GitHub repository VARIABLES for deploy.yml:
#          ECR_REPOSITORY=unshelvd, ECS_CLUSTER=unshelvd, ECS_SERVICE=unshelvd,
#          ECS_CONTAINER_NAME=unshelvd, DATABASE_URL_SECRET_ID=unshelvd/DATABASE_URL
#          CODECOMMIT_HTTP_URL=<CodeCommitCloneUrlHttp output>
#     d. Route 53 → Hosted zones → koshkikode.com → Create record:
#          unshelvd.koshkikode.com  A  Alias → ALB → <AlbDnsName output>
#          cdn.koshkikode.com       A  Alias → CloudFront → <CloudFrontDomainName output>
#     e. SES SMTP credentials — Console: SES → SMTP settings → Create SMTP credentials.
#          Store the SMTP username in ecs-task-def.json (SMTP_USER env var) or
#          configure email later via the admin panel (/#/admin → Settings → Email).
#          Store the SMTP password → Secrets Manager → unshelvd/SMTP_PASS →
#          "Set secret value" → enter the password (replaces the placeholder).
#     f. Amplify Hosting — Console: Amplify → Host web app → GitHub →
#          KoshkiKode/unshelvd → branch: main.
#          Add env vars: VITE_STRIPE_PUBLISHABLE_KEY (optional, can be left blank
#          and configured via admin panel later), VITE_THRIFTBOOKS_AFF_ID,
#          VITE_ADSENSE_CLIENT.
#          Rewrites (in order): /api/<*> → https://<AlbDnsName>/api/<*> (200),
#          /ws/<*> → https://<AlbDnsName>/ws/<*> (200), /<*> → /index.html (200).
#          Custom domain → unshelvd.koshkikode.com.
#     g. Push to main → deploy.yml runs automatically → first real deploy.
#     h. Sign in at /#/admin → Settings → Payments to add Stripe/PayPal keys.
#          Stripe, PayPal keys are NOT required for launch — the platform runs
#          without payments until you add them via the admin panel.
# ──────────────────────────────────────────────────────────────────────────────

Parameters:
  AppName:
    Type: String
    Default: unshelvd
    Description: Logical app name; used for resource naming.

  DomainName:
    Type: String
    Default: koshkikode.com
    Description: Apex domain. The ALB serves api/ws on `unshelvd.<DomainName>`,
      and the CloudFront distribution serves images on `cdn.<DomainName>`.

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (in this region) covering
      `unshelvd.<DomainName>`. Used for the ALB HTTPS:443 listener.

  CdnCertificateArn:
    Type: String
    Default: ""
    Description: (Optional) ACM certificate ARN in us-east-1 covering
      `cdn.<DomainName>`. Required for CloudFront. If left blank, the
      CloudFront distribution is created without an alias and you can
      add the alias later in the console.

  AlertEmail:
    Type: String
    Description: Email address subscribed to the alarm SNS topic.

  DBUser:
    Type: String
    Default: unshelvd
    Description: Master username for the RDS instance.

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Master password for the RDS instance. Stored in
      `unshelvd/DATABASE_URL` after the stack creates the secret.

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues:
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
    Description: Right-size for launch (micro), bump as traffic grows.

  SmtpUser:
    Type: String
    Default: ""
    Description: >-
      SES SMTP username (IAM access key ID, looks like AKIAIOSFODNN7EXAMPLE).
      Generate via SES console → SMTP settings → Create SMTP credentials.
      Can also be left blank and configured later via the admin panel
      (/#/admin → Settings → Email). The password goes into the
      unshelvd/SMTP_PASS secret — set it via Secrets Manager console after
      the stack is created.

  ContainerImage:
    Type: String
    Default: ""
    Description: (Optional) Initial container image. Leave blank on first
      deploy — the ECS service will be created with a placeholder and the
      deploy.yml GitHub Action will replace it on the next push to main.

  GitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: >-
      ARN of an existing GitHub OIDC provider in this account.
      Leave blank to have the stack create it automatically.
      Only one provider per URL is allowed per AWS account; if one already
      exists pass its ARN here to avoid a duplicate-resource error.
      Find it in IAM → Identity providers, or run:
        aws iam list-open-id-connect-providers
      Typically: arn:aws:iam::261142221895:oidc-provider/token.actions.githubusercontent.com

# ──────────────────────────────────────────────────────────────────────────────
Conditions:
  HasContainerImage:       !Not [!Equals [!Ref ContainerImage, ""]]
  HasCdnCert:              !Not [!Equals [!Ref CdnCertificateArn, ""]]
  CreateGitHubOidcProvider: !Equals [!Ref GitHubOidcProviderArn, ""]

# ──────────────────────────────────────────────────────────────────────────────
Resources:

  # ── 0. GitHub OIDC provider (created only when GitHubOidcProviderArn is blank)
  # Allows GitHub Actions to exchange a short-lived JWT for temporary AWS
  # credentials without storing long-lived IAM access keys as secrets.
  # If your account already has this provider, pass its ARN via the
  # GitHubOidcProviderArn parameter instead of letting the stack create one.
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # AWS validates GitHub's OIDC tokens against GitHub's published JWKS
      # endpoint; the thumbprint below is the SHA-1 of the TLS certificate
      # used by token.actions.githubusercontent.com (both current values are
      # listed so a certificate rotation doesn't require a stack update).
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # ── 1. VPC + 2 public subnets (ALB) + 2 private subnets (ECS, RDS) ─────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.40.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: !Sub "${AppName}-vpc" }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub "${AppName}-igw" }]

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.40.1.0/24
      AvailabilityZone: us-east-1a   # AZ 1
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub "${AppName}-public-a" }]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.40.2.0/24
      AvailabilityZone: us-east-1d   # AZ 4
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub "${AppName}-public-b" }]

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.40.11.0/24
      AvailabilityZone: us-east-1a   # AZ 1
      Tags: [{ Key: Name, Value: !Sub "${AppName}-private-a" }]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.40.12.0/24
      AvailabilityZone: us-east-1d   # AZ 4
      Tags: [{ Key: Name, Value: !Sub "${AppName}-private-b" }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub "${AppName}-public-rt" }]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable }
  PublicAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable }

  # NAT for ECS tasks to reach ECR/SES/Secrets Manager. Single-AZ to keep
  # launch costs down (~$33/mo). Move to one-per-AZ for production HA.
  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties: { Domain: vpc }

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags: [{ Key: Name, Value: !Sub "${AppName}-nat" }]

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: !Sub "${AppName}-private-rt" }]

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRouteTable }
  PrivateAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTable }

  # ── 2. Security groups: ALB → ECS → RDS ────────────────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ALB
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirected to HTTPS by ALB rule)

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS Fargate tasks
      VpcId: !Ref Vpc

  EcsIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: App port from ALB only

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL
      VpcId: !Ref Vpc

  DbIngressFromEcs:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DbSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EcsSecurityGroup
      Description: Postgres from ECS tasks only

  # ── 3. RDS PostgreSQL ──────────────────────────────────────────────────────
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${AppName} private subnets"
      SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Ref AppName
      Engine: postgres
      EngineVersion: "16"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref AppName
      VPCSecurityGroups: [!Ref DbSecurityGroup]
      DBSubnetGroupName: !Ref DbSubnetGroup
      MultiAZ: false # turn on before public launch
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "04:00-04:30"
      DeletionProtection: true
      EnablePerformanceInsights: true
      AutoMinorVersionUpgrade: true

  # ── 4. Secrets Manager scaffold ────────────────────────────────────────────
  # We pre-create DATABASE_URL with the connection string built from the
  # RDS endpoint. The other six secrets are created empty so the ECS task
  # definition references resolve at deploy time; populate them via the
  # console or CLI before the first `wait-for-service-stability` succeeds.
  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/DATABASE_URL"
      Description: PostgreSQL connection string for the app.
      SecretString: !Sub "postgresql://${DBUser}:${DBPassword}@${DbInstance.Endpoint.Address}:5432/${AppName}?sslmode=require"

  SessionSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/SESSION_SECRET"
      Description: express-session signing secret.
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true

  StripeSecretKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/STRIPE_SECRET_KEY"
      Description: Populate with sk_live_… from the Stripe dashboard.
      SecretString: "PLACEHOLDER_set_via_console"

  StripeWebhookSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/STRIPE_WEBHOOK_SECRET"
      Description: Populate with whsec_… from the Stripe webhook endpoint.
      SecretString: "PLACEHOLDER_set_via_console"

  PaypalClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/PAYPAL_CLIENT_SECRET"
      Description: Populate with EFgh… from the PayPal developer dashboard.
      SecretString: "PLACEHOLDER_set_via_console"

  PaypalWebhookId:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/PAYPAL_WEBHOOK_ID"
      Description: Webhook ID from the PayPal Developer Dashboard.
      SecretString: "PLACEHOLDER_set_via_console"

  SmtpPass:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/SMTP_PASS"
      Description: SES SMTP password (generate from the SES console).
      SecretString: "PLACEHOLDER_set_via_console"

  # ── 5. ECR repo with scan-on-push ──────────────────────────────────────────
  EcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref AppName
      ImageScanningConfiguration: { ScanOnPush: true }
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        # Keep the last 20 tagged images; expire untagged after 7 days.
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep only the 20 most recent tagged images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ── 6. IAM roles for ECS ───────────────────────────────────────────────────
  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-ecs-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadAppSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                # Wildcard covers all current and future unshelvd/* secrets so
                # adding a new secret doesn't require a role policy update.
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppName}/*"

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-ecs-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Uploads
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${UploadsBucket}/*"
              - Sid: SesSend
                Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  # ── 7. GitHub deploy role ──────────────────────────────────────────────────
  # Enables GitHub Actions to authenticate via OIDC — no long-lived AWS keys
  # stored as secrets. The trust policy is scoped to this repo only.
  # The Federated principal resolves to the OIDC provider created above when
  # GitHubOidcProviderArn is blank, or to the existing provider ARN otherwise.
  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !GetAtt GitHubOidcProvider.Arn
                - !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                # Scoped to KoshkiKode/unshelvd only — any branch, any trigger.
                "token.actions.githubusercontent.com:sub": "repo:KoshkiKode/unshelvd:*"
      Policies:
        - PolicyName: EcrPush
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:DescribeImages
                Resource: !GetAtt EcrRepo.Arn
        - PolicyName: EcsDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${AppName}/${AppName}"
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt EcsExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DatabaseUrlSecret
        - PolicyName: CodeCommitMirrorPush
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: codecommit:GitPush
                Resource: !GetAtt CodeCommitRepo.Arn

  # ── 8. CodeCommit repository (AWS-native mirror) ───────────────────────────
  # Acts as an AWS-hosted mirror of github.com/KoshkiKode/unshelvd.
  # The mirror-to-codecommit.yml GitHub Actions workflow pushes to it on
  # every commit via the GitHubDeployRole OIDC credentials.
  CodeCommitRepo:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Ref AppName
      RepositoryDescription: AWS-native mirror of github.com/KoshkiKode/unshelvd

  # ── 9. IAM user: dogeisbae ─────────────────────────────────────────────────
  # dogeisbae is both the GitHub username and the IAM username for the owner.
  # Granted full CodeCommit access to the mirror repo, plus read-only
  # visibility into ECS, ECR, and the CloudFormation stack.
  DogeisbaeUser:
    Type: AWS::IAM::User
    Properties:
      UserName: dogeisbae
      Policies:
        - PolicyName: CodeCommitFullAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                  - codecommit:GitPush
                  - codecommit:GetBranch
                  - codecommit:ListBranches
                  - codecommit:CreateBranch
                  - codecommit:DeleteBranch
                  - codecommit:GetRepository
                  - codecommit:GetCommit
                  - codecommit:ListRepositories
                  - codecommit:GetDifferences
                  - codecommit:GetBlob
                  - codecommit:CreatePullRequest
                  - codecommit:GetPullRequest
                  - codecommit:ListPullRequests
                  - codecommit:MergePullRequestByFastForward
                  - codecommit:MergePullRequestBySquash
                  - codecommit:MergePullRequestByThreeWay
                Resource: !GetAtt CodeCommitRepo.Arn
        - PolicyName: ReadOnlyVisibility
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:Describe*
                  - ecs:List*
                  - ecr:Describe*
                  - ecr:List*
                  - ecr:GetRepositoryPolicy
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: "*"

  # ── 10. CloudWatch log group ────────────────────────────────────────────────
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}"
      RetentionInDays: 30

  # ── 11. ALB + target group + listeners (sticky sessions on for WS fan-out) ──
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-alb"
      Type: application
      Scheme: internet-facing
      Subnets: [!Ref PublicSubnetA, !Ref PublicSubnetB]
      SecurityGroups: [!Ref AlbSecurityGroup]

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-tg"
      VpcId: !Ref Vpc
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher: { HttpCode: "200" }
      TargetGroupAttributes:
        # Sticky sessions are critical: server/chat.ts keeps an in-memory
        # Map<conversationId, Set<WebSocket>> so both sides of a chat must
        # land on the same task. Application-based stickiness keys on the
        # ALB-issued cookie below.
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "3600"
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 443
      Protocol: HTTPS
      Certificates: [{ CertificateArn: !Ref CertificateArn }]
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ── 12. ECS cluster + Fargate service ───────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref AppName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref AppName
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref AppName
          Image: !If
            - HasContainerImage
            - !Ref ContainerImage
            - !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AppName}:latest"
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - { Name: NODE_ENV,             Value: production }
            - { Name: PORT,                 Value: "8080" }
            - { Name: APP_URL,              Value: !Sub "https://unshelvd.${DomainName}" }
            - { Name: PUBLIC_APP_URL,       Value: !Sub "https://unshelvd.${DomainName}" }
            - { Name: WEB_BASE_URL,         Value: !Sub "https://unshelvd.${DomainName}" }
            - { Name: CORS_ALLOWED_ORIGINS, Value: !Sub "https://unshelvd.${DomainName}" }
            - { Name: S3_BUCKET_NAME,       Value: !Ref UploadsBucket }
            # CDN_BASE_URL: use custom cdn.<domain> when a CDN cert is provided;
            # fall back to the auto-generated *.cloudfront.net domain otherwise
            # so image uploads work immediately without a custom domain cert.
            - Name: CDN_BASE_URL
              Value: !If
                - HasCdnCert
                - !Sub "https://cdn.${DomainName}"
                - !Sub "https://${CloudFrontDistribution.DomainName}"
            - { Name: AWS_REGION,           Value: !Ref AWS::Region }
            - { Name: SMTP_HOST,            Value: !Sub "email-smtp.${AWS::Region}.amazonaws.com" }
            - { Name: SMTP_PORT,            Value: "587" }
            # SMTP_USER: SES SMTP username (IAM access key ID). Set via the
            # SmtpUser parameter at deploy time, or leave blank and configure
            # later via the admin panel (/#/admin → Settings → Email).
            - { Name: SMTP_USER,            Value: !Ref SmtpUser }
            - { Name: EMAIL_FROM,           Value: !Sub "Unshelv'd <noreply@${DomainName}>" }
          Secrets:
            - { Name: DATABASE_URL,          ValueFrom: !Ref DatabaseUrlSecret }
            - { Name: SESSION_SECRET,        ValueFrom: !Ref SessionSecret }
            # Stripe keys are intentionally NOT injected here. The PLACEHOLDER
            # values would make the server believe Stripe is configured (breaking
            # every checkout). Add your real keys via the admin panel instead:
            #   /#/admin → Settings → Payments → Stripe
            # When you are ready to use env-var injection instead, populate the
            # unshelvd/STRIPE_SECRET_KEY and unshelvd/STRIPE_WEBHOOK_SECRET
            # secrets in Secrets Manager and uncomment the two lines below.
            # - { Name: STRIPE_SECRET_KEY,     ValueFrom: !Ref StripeSecretKey }
            # - { Name: STRIPE_WEBHOOK_SECRET, ValueFrom: !Ref StripeWebhookSecret }
            - { Name: PAYPAL_CLIENT_SECRET,  ValueFrom: !Ref PaypalClientSecret }
            - { Name: PAYPAL_WEBHOOK_ID,     ValueFrom: !Ref PaypalWebhookId }
            - { Name: SMTP_PASS,             ValueFrom: !Ref SmtpPass }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8080/api/health || exit 1"
            Interval: 10
            Timeout: 5
            Retries: 3
            StartPeriod: 30

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: HttpsListener
    Properties:
      ServiceName: !Ref AppName
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
          SecurityGroups: [!Ref EcsSecurityGroup]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: !Ref AppName
          ContainerPort: 8080
          TargetGroupArn: !Ref AppTargetGroup
      HealthCheckGracePeriodSeconds: 60

  # Autoscaling: 1 → 4 tasks at 60% CPU
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub "service/${EcsCluster}/${EcsService.Name}"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AppName}-cpu-target-tracking"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 120
        ScaleOutCooldown: 60

  # ── 13. S3 uploads bucket fronted by CloudFront via OAC ────────────────────
  UploadsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AppName}-uploads"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTieringForImages
            Status: Enabled
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  CloudFrontOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AppName}-uploads-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AppName} uploads CDN"
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCdnCert
          - [!Sub "cdn.${DomainName}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCdnCert
          - AcmCertificateArn: !Ref CdnCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: s3-uploads
            DomainName: !GetAtt UploadsBucket.RegionalDomainName
            S3OriginConfig: { OriginAccessIdentity: "" }
            OriginAccessControlId: !GetAtt CloudFrontOac.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-uploads
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed-CachingOptimized — 1y TTLs, gzip/brotli, no query keys.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  UploadsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOacRead
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${UploadsBucket}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── 14. CloudWatch alarms → SNS → email ────────────────────────────────────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AppName}-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  Alb5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-alb-5xx"
      AlarmDescription: ALB returned more than 10 5xx responses in 5 minutes.
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt Alb.LoadBalancerFullName
      AlarmActions: [!Ref AlarmTopic]

  AlbUnhealthyHostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-unhealthy-hosts"
      AlarmDescription: Target group has at least one unhealthy host for 5 minutes.
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TargetGroup
          Value: !GetAtt AppTargetGroup.TargetGroupFullName
        - Name: LoadBalancer
          Value: !GetAtt Alb.LoadBalancerFullName
      AlarmActions: [!Ref AlarmTopic]

  RdsCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-rds-cpu"
      AlarmDescription: RDS CPU above 80% for 15 minutes.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DbInstance
      AlarmActions: [!Ref AlarmTopic]

  RdsStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-rds-storage"
      AlarmDescription: RDS free storage below 2 GB.
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2147483648 # 2 GiB in bytes
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref DbInstance
      AlarmActions: [!Ref AlarmTopic]

# ──────────────────────────────────────────────────────────────────────────────
Outputs:
  AlbDnsName:
    Description: Public ALB DNS — create a Route 53 alias `unshelvd.<domain>` → this.
    Value: !GetAtt Alb.DNSName
    Export: { Name: !Sub "${AppName}-alb-dns" }

  CloudFrontDomainName:
    Description: CloudFront domain — create a Route 53 alias `cdn.<domain>` → this.
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export: { Name: !Sub "${AppName}-cdn-domain" }

  EcrRepositoryUri:
    Description: Push your Docker image here.
    Value: !GetAtt EcrRepo.RepositoryUri
    Export: { Name: !Sub "${AppName}-ecr-uri" }

  RdsEndpoint:
    Description: RDS PostgreSQL endpoint (private — only reachable from ECS).
    Value: !GetAtt DbInstance.Endpoint.Address

  UploadsBucketName:
    Description: S3 bucket for avatars and covers.
    Value: !Ref UploadsBucket
    Export: { Name: !Sub "${AppName}-uploads-bucket" }

  AlertTopicArn:
    Description: SNS topic for CloudWatch alarms.
    Value: !Ref AlarmTopic

  GitHubDeployRoleArn:
    Description: >-
      Paste this ARN into the AWS_DEPLOY_ROLE_ARN GitHub repository secret.
      The deploy.yml workflow uses it to authenticate via OIDC.
    Value: !GetAtt GitHubDeployRole.Arn
    Export: { Name: !Sub "${AppName}-github-deploy-role-arn" }

  GitHubOidcProviderArn:
    Description: >-
      ARN of the GitHub OIDC provider used by the deploy role.
      Verify this matches arn:aws:iam::ACCOUNT:oidc-provider/token.actions.githubusercontent.com
    Value: !If
      - CreateGitHubOidcProvider
      - !GetAtt GitHubOidcProvider.Arn
      - !Ref GitHubOidcProviderArn

  CodeCommitCloneUrlHttp:
    Description: >-
      HTTPS clone URL for the CodeCommit mirror repo. Set this as the
      CODECOMMIT_HTTP_URL GitHub Actions variable so mirror-to-codecommit.yml
      can push to it.
    Value: !GetAtt CodeCommitRepo.CloneUrlHttp
    Export: { Name: !Sub "${AppName}-codecommit-https" }

  CodeCommitCloneUrlSsh:
    Description: SSH clone URL for the CodeCommit mirror repo.
    Value: !GetAtt CodeCommitRepo.CloneUrlSsh
    Export: { Name: !Sub "${AppName}-codecommit-ssh" }
