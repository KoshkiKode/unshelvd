# AWS Amplify Hosting build spec
# ──────────────────────────────
# Amplify Hosting builds and serves the static SPA from `dist/public`.
# All `/api/**` and `/ws/**` requests are proxied to the ECS Fargate service
# via a Custom Rewrite + Redirect rule configured once in the Amplify console
# (see the rewrites block below and DEPLOY.md Step 12c).
#
# Required Amplify environment variables (set per branch in the console):
#   VITE_API_URL                 — usually empty so the SPA uses the same
#                                  origin and the rewrite proxies /api/**
#   VITE_STRIPE_PUBLISHABLE_KEY  — pk_live_… or pk_test_…
#   VITE_THRIFTBOOKS_AFF_ID      — optional ThriftBooks affiliate ID
#   VITE_ADSENSE_CLIENT          — optional AdSense publisher ID

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - SKIP_ENV_VERIFY=true npm run build
  artifacts:
    baseDirectory: dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

# Configure these in the Amplify console under "Rewrites and redirects".
# Order matters — process top-to-bottom; the SPA fallback MUST be last:
#
#   Source                Target                                                   Type
#   ─────────             ──────────────────────────────────────                   ────
#   /api/<*>              https://unshelvd.koshkikode.com/api/<*>                  200 (rewrite)
#   /ws/<*>               https://unshelvd.koshkikode.com/ws/<*>                   200 (rewrite)
#   /<*>                  /index.html                                              200 (rewrite)
#
# `unshelvd.koshkikode.com` is the Route 53 alias of the ECS Application Load
# Balancer (see infra/unshelvd.cfn.yaml). Using the custom domain (instead of
# the raw ALB DNS name) means cookies, CORS, and TLS all line up with what
# the API server expects.
#
# Amplify Hosting forwards the WebSocket upgrade through the /ws rewrite, so
# `wss://<your-amplify-domain>/ws` reaches the chat server the same way the
# native Capacitor apps do directly.

customHeaders:
  - pattern: '/assets/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
